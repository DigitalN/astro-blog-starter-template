<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prairie Bright – Managed Billing for MSPs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f2044;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 30px;
            padding: 48px 40px 40px;
            max-width: 820px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
        }

        .logo-img {
            height: 56px;
            width: auto;
        }

        .header-contact a {
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border: 1.5px solid #2563eb;
            padding: 7px 16px;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }

        .header-contact a:hover {
            background: #2563eb;
            color: #fff;
        }

        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 48px;
        }

        .badge {
            display: inline-block;
            background: #eff6ff;
            color: #2563eb;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 52px;
            font-weight: 800;
            color: #0f2044;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        h1 span {
            color: #2563eb;
        }

        .hero-sub {
            font-size: 18px;
            color: #475569;
            line-height: 1.6;
            max-width: 560px;
            margin: 0 auto 36px;
        }

        /* Value props */
        .value-props {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 48px;
        }

        .prop-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 24px 20px;
            text-align: left;
        }

        .prop-icon {
            font-size: 28px;
            margin-bottom: 12px;
            display: block;
        }

        .prop-card h3 {
            font-size: 15px;
            font-weight: 700;
            color: #0f2044;
            margin-bottom: 8px;
        }

        .prop-card p {
            font-size: 14px;
            color: #64748b;
            line-height: 1.55;
        }

        /* Contact section */
        .contact-section {
            text-align: center;
        }

        .contact-section h2 {
            font-size: 22px;
            font-weight: 700;
            color: #0f2044;
            margin-bottom: 8px;
        }

        .contact-section p {
            font-size: 15px;
            color: #64748b;
            margin-bottom: 24px;
        }

        .email-btn {
            display: inline-block;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .email-btn:hover {
            background-color: #1d4ed8;
        }

        /* Footer stripe */
        .footer-stripe {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #2563eb 0%, #0f2044 100%);
            border-radius: 0 0 30px 30px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 32px 20px 36px;
            }

            h1 {
                font-size: 36px;
            }

            .hero-sub {
                font-size: 16px;
            }

            .value-props {
                grid-template-columns: 1fr;
            }

            .header-contact a {
                font-size: 13px;
                padding: 6px 12px;
            }

            .logo-img {
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <header class="header">
            <img src="logo.png" alt="Prairie Bright logo" class="logo-img">
            <div class="header-contact">
                <a href="mailto:keith@prairiebright.ca">keith@prairiebright.ca</a>
            </div>
        </header>
